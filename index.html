<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LotoFácil Estratégica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/api-caixa.js"></script>
    <script src="assets/js/historico-bilhetes.js"></script>
    <script src="assets/js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="max-w-3xl mx-auto py-6 px-2">
        <!-- Último resultado oficial -->
        <div id="ultimoResultado" class="mb-6"></div>

        <!-- Cards de análises estratégicas -->
        <div id="cardsAnalises" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8"></div>

        <!-- Resultados dos jogos gerados -->
        <section id="resultados" class="hidden">
            <h2 class="text-xl font-bold mb-2">Jogos Gerados</h2>
            <div id="estrategiaUsada" class="mb-2 text-sm text-blue-700"></div>
            <div id="jogosGerados"></div>
        </section>

        <!-- Tabela de premiação real -->
        <div id="tabelaPremiacao" class="mt-8"></div>
    </div>
</body>
</html>
